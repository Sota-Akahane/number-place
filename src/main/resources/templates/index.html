<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" th:href="@{/css/board.css}" />
    <link rel="stylesheet" th:href="@{/css/hint.css}" />
    <title>ナンプレ</title>
  </head>
  <script th:src="@{/js/board.js}"></script>
  <body>
    <table class="sudoku">
      <tr th:each="rowCells : ${puzzle.cells}">
        <td th:each="cell : ${rowCells}">
          <input
            class="cell"
            th:name="|cell_${cell.row}_${cell.col}|"
            th:value="${cell.number == 0 ? '' : cell.number}"
            th:readonly="${cell.number != 0}"
          />
        </td>
      </tr>
    </table>
    <div th:if="${hint != null}" class="hint-box">
      <p>
        <strong>ヒント：</strong>
        <span th:text="${hint.techniqueType.techniqueName}"></span>
      </p>
      <p th:text="${hint.relatedCells}"></p>
      <p th:text="${hint.description}"></p>
    </div>

    <form th:action="@{/hint}" method="post" class="hint-form">
      <input type="hidden" name="board" id="boardString" />
      <button type="submit" class="hint-button" onclick="buildBoardString()">
        💡 ヒント
      </button>
    </form>
  </body>
</html>
