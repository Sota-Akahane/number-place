<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ナンプレ</title>
  </head>
  <body>
    <table border="1">
      <tr th:each="rowCells : ${puzzle.cells}">
        <td th:each="cell : ${rowCells}">
          <span th:if="${cell.number != 0}" th:text="${cell.number()}"
            >number</span
          >
          <input
            th:if="${cell.number == 0}"
            th:name="|cell_${cell.row}_${cell.col}|"
          />
        </td>
      </tr>
    </table>
  </body>
</html>
